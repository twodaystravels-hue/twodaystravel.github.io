    display:flex; justify-content:space-between; align-items:center; font-size:11px;
  }

  /* RESPONSIVE */
  @media (max-width: 860px) {
    .hero { grid-template-columns:1fr; min-height:auto; }
    .hero-right { display:none; }
    .hero-left { padding:3.5rem 1.5rem 3rem; }
    .sk-grid { grid-template-columns:1fr; }
    .contact-wrap { grid-template-columns:1fr; }
    .tl-item { grid-template-columns:1fr; gap:.25rem; }
    .tl-item::before, .tl-item::after { display:none; }
    .tl-meta { text-align:left; padding-right:0; }
    .tl-body { padding-left:0; }
    .edu-grid { grid-template-columns:1fr; }
    .nav-links, #nav-cv { display:none !important; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="#" id="nav-name"></a>
  <ul class="nav-links">
    <li><a href="#projects">Work</a></li>
    <li><a href="#skills">Skills</a></li>
    <li><a href="#experience">Experience</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
  <a href="#" id="nav-cv">Download CV ↓</a>
</nav>

<!-- HERO -->
<section class="hero" id="home">
  <div class="hero-left">
    <p class="eyebrow" id="h-role"></p>
    <h1 class="hero-h1" id="h-tagline"></h1>
    <div class="hero-btns" id="h-btns"></div>
    <div class="hero-stats" id="h-stats"></div>
  </div>
  <div class="hero-right">
    <div class="intro-card">
      <div class="intro-lbl">About me</div>
      <p id="intro-p"></p>
    </div>
    <div class="tag-cloud" id="tag-cloud"></div>
  </div>
</section>

<!-- PROJECTS -->
<section id="projects">
  <p class="sec-eyebrow">Selected work</p>
  <h2 class="sec-h2">Projects that made a difference</h2>
  <div class="proj-grid" id="proj-grid"></div>
</section>

<!-- SKILLS -->
<section id="skills">
  <p class="sec-eyebrow">Capabilities</p>
  <h2 class="sec-h2">Tools, techniques &amp; domains</h2>
  <div class="sk-grid" id="sk-grid"></div>
</section>

<!-- EXPERIENCE -->
<section id="experience">
  <p class="sec-eyebrow">Career history</p>
  <h2 class="sec-h2">Where I've built my craft</h2>
  <div class="tl" id="tl"></div>
  <p class="edu-h" style="margin-top:3rem">Education</p>
  <div class="edu-grid" id="edu-grid"></div>
</section>

<!-- CONTACT -->
<section id="contact">
  <p class="sec-eyebrow">Get in touch</p>
  <h2 class="sec-h2">Let's build something together</h2>
  <div class="contact-wrap">
    <div class="c-links" id="c-links"></div>
    <form class="c-form" onsubmit="return false;">
      <div class="f-row">
        <div class="f-grp"><label>Name</label><input type="text" placeholder="Your name"></div>
        <div class="f-grp"><label>Email</label><input type="email" placeholder="your@email.com"></div>
      </div>
      <div class="f-grp"><label>Subject</label><input type="text" placeholder="e.g. Freelance enquiry, job opportunity…"></div>
      <div class="f-grp"><label>Message</label><textarea rows="5" placeholder="Tell me about the project or opportunity…"></textarea></div>
      <button class="btn-send" type="submit">Send message →</button>
    </form>
  </div>
</section>

<footer>
  <span id="footer-copy"></span>
  <span>Data Portfolio</span>
</footer>

<!-- RENDER ENGINE -->
<script>
const C = CONFIG;

/* Page title */
document.title = C.name + " — Data Portfolio";

/* Nav */
document.getElementById("nav-name").textContent = C.name;
const cvVal = C.contact.cv;
if (cvVal && cvVal.trim() !== "" && cvVal !== "#") {
  const el = document.getElementById("nav-cv");
  el.href = cvVal;
  el.setAttribute("target", "_blank");
  el.setAttribute("rel", "noopener noreferrer");
  el.classList.add("show");
}

/* Hero: role + location */
document.getElementById("h-role").textContent =
  C.role + (C.location ? " · " + C.location : "");

/* Hero: tagline — last word in italic */
(function(){
  const words = C.tagline.replace(/\.$/, "").trim().split(" ");
  const last = words.pop();
  document.getElementById("h-tagline").innerHTML =
    (words.length ? words.join(" ") + " " : "") + "<em>" + last + ".</em>";
})();

/* Hero: buttons */
let btns = `<a href="#projects" class="btn-p">View my work →</a>`;
if (cvVal && cvVal.trim() !== "" && cvVal !== "#")
  btns += `<a href="${cvVal}" class="btn-o" target="_blank" rel="noopener noreferrer">Download CV</a>`;
document.getElementById("h-btns").innerHTML = btns;

/* Hero: stats */
document.getElementById("h-stats").innerHTML =
  C.stats.map(s =>
    `<div><div class="stat-n">${s.num}</div><div class="stat-l">${s.label}</div></div>`
  ).join("");

/* Hero: intro text */
document.getElementById("intro-p").textContent =
  C.intro.trim().replace(/[ \t]+/g, " ").replace(/\n[ \t]*/g, "\n");

/* Hero: skill tags */
document.getElementById("tag-cloud").innerHTML =
  C.skillTags.map(t => `<span class="s-tag">${t}</span>`).join("");

/* Projects */
function safeProjectHref(raw) {
  if (!raw || raw === "#") return "#";
  if (raw.startsWith("http://") || raw.startsWith("https://")) return raw;
  return "https://" + raw;
}
document.getElementById("proj-grid").innerHTML = C.projects.map(p => {
  const c = p.color || "green";
  const href = safeProjectHref(p.link);
  const isLive = href !== "#";
  return `<a class="p-card" href="${href}"${isLive ? ' target="_blank" rel="noopener noreferrer"' : ''}>
    <div class="p-cat c-${c}"><span class="cat-dot dot-${c}"></span>${p.category}</div>
    ${p.impact ? `<span class="p-impact">${p.impact}</span>` : ""}
    <h3 class="p-title">${p.title}</h3>
    <p class="p-desc">${p.description}</p>
    <div class="p-tags">${p.tags.map(t => `<span class="p-tag">${t}</span>`).join("")}</div>
    <span class="p-arrow">${isLive ? "↗" : "·"}</span>
  </a>`;
}).join("");

/* Skills */
function renderSkillCol(col) {
  return `<div class="sk-col">
    <h3>${col.heading}</h3>
    ${col.items.map(sk => {
      const dots = Array.from({length:5}, (_,i) =>
        `<span class="d${i < sk.dots ? (sk.style==="warm" ? " w" : " g") : ""}"></span>`
      ).join("");
      return `<div class="sk-row">
        <span class="sk-name">${sk.name}</span>
        <div class="sk-dots">${dots}</div>
      </div>`;
    }).join("")}
  </div>`;
}
document.getElementById("sk-grid").innerHTML =
  renderSkillCol(C.skills.left) + renderSkillCol(C.skills.right);

/* Experience */
document.getElementById("tl").innerHTML = C.experience.map(e =>
  `<div class="tl-item">
    <div class="tl-meta">
      <div class="tl-date">${e.startDate} — ${e.endDate}</div>
      <div class="tl-co">${e.company}</div>
    </div>
    <div class="tl-body">
      <div class="tl-title">${e.title}</div>
      <p class="tl-sum">${e.summary}</p>
      ${e.bullets && e.bullets.length
        ? `<ul class="tl-bul">${e.bullets.map(b=>`<li>${b}</li>`).join("")}</ul>`
        : ""}
    </div>
  </div>`
).join("");

/* Education */
document.getElementById("edu-grid").innerHTML = C.education.map(e =>
  `<div class="edu-card">
    <div class="edu-dates">${e.startDate} — ${e.endDate}</div>
    <div class="edu-inst">${e.institution}</div>
    <div class="edu-qual">${e.qualification}</div>
    <div class="edu-det">${e.detail}</div>
  </div>`
).join("");

/* Contact links */
const lnk = C.contact;

// Safely build a full URL — handles already-prefixed values, bare domains, and mailto
function makeHref(key, val) {
  if (!val) return "";
  if (key === "email") return "mailto:" + val;
  if (val.startsWith("http://") || val.startsWith("https://")) return val;
  return "https://" + val;
}

const defs = [
  { key:"email",    icon:"✉",  label:"Email",     val:lnk.email    },
  { key:"linkedin", icon:"in", label:"LinkedIn",  val:lnk.linkedin },
  { key:"github",   icon:"⌥",  label:"GitHub",    val:lnk.github   },
  { key:"notion",   icon:"◈",  label:"Portfolio", val:lnk.notion   },
];
document.getElementById("c-links").innerHTML = defs
  .filter(d => d.val && d.val.trim() !== "")
  .map(d => {
    const href = makeHref(d.key, d.val);
    const isExternal = d.key !== "email";
    return `<a href="${href}" class="c-link"${isExternal ? ' target="_blank" rel="noopener noreferrer"' : ""}>
      <div class="c-icon">${d.icon}</div>
      <div class="c-txt"><div class="c-lbl">${d.label}</div><div class="c-val">${d.val}</div></div>
      <div class="c-arr">↗</div>
    </a>`;
  }).join("");

/* Footer */
document.getElementById("footer-copy").textContent =
  "© " + new Date().getFullYear() + " " + C.name;
</script>
</body>
</html>
